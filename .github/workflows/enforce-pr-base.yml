name: Enforce PR Base Branch

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  enforce-base-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Allow PRs targeting develop
        if: ${{ github.event.pull_request.base.ref == 'develop' }}
        run: echo "PR base branch is develop."

      - name: Close PRs targeting non-develop branches
        if: ${{ github.event.pull_request.base.ref != 'develop' }}
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const baseRef = context.payload.pull_request.base.ref;
            const message = [
              "This repository only accepts pull requests targeting `develop`.",
              "",
              `Current base branch: \`${baseRef}\``,
              "",
              "Please change the base branch to `develop` and reopen this pull request.",
            ].join("\n");

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: message,
            });

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: prNumber,
              state: "closed",
            });

            core.setFailed("Pull requests must target develop.");
